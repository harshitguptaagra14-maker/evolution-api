services:
  - type: web
    name: evolution-api
    env: docker
    plan: free # Change to 'starter' if you want it to stay awake 24/7
    region: ohio
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: AUTHENTICATION_API_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: evolution-db
          property: connectionString
      - key: REDIS_URI
        fromService:
          type: redis
          name: evolution-redis
          property: connectionString

databases:
  - name: evolution-db
    plan: free

keyValue:
  - name: evolution-redis
    plan: free
