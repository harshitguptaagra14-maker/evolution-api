services:
  - type: web
    name: evolution-api
    env: docker
    plan: free
    region: ohio
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: AUTHENTICATION_API_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: evolution-db
          property: connectionString
      - key: REDIS_URI
        sync: false # We will add this manually in the dashboard

databases:
  - name: evolution-db
    plan: free
